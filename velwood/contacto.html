<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/velwoodestilo.css" type="text/css">
    <title>Velwood Liquor Store | Contacto</title>
</head>
<body>
<header class="header">
    <div class="container">
        <nav class="navbar">
            <a href="velwood.html" class="logo"><img src="img/velwood1.png" alt="Velwood logo"><span class="site-title">Velwood</span></a>
            <ul class="nav-links">
                <li><a href="velwood.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
            </ul>
        </nav>
    </div>
</header>
<main>
    <section class="section">
        <div class="container">
            <h1 class="section-title">Contáctanos</h1>
            <p style="text-align:center; max-width: 700px; margin: 0 auto 2rem; color: rgba(242,242,242,0.8);">¿Tienes alguna pregunta? Envíanos un mensaje y te responderemos lo antes posible.</p>
            <div class="contact-section">
                <form class="contact-form" action="#" method="post">
                    <h2>Escríbenos</h2>
                    <label for="name">Nombre</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>

                    <label for="phone">Teléfono</label>
                    <input type="tel" id="phone" name="phone">

                    <label for="message">Mensaje</label>
                    <textarea id="message" name="message" rows="5" required></textarea>

                    <button type="submit">Enviar mensaje</button>
                </form>

                <div class="contact-map">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d17953.316396456274!2d-69.80563711284178!3d18.4929674!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8eaf8763ae71e967%3A0x911077dbe8482dc7!2sVelwoodliquorstore!5e1!3m2!1ses!2sdo!4v1773759353758!5m2!1ses!2sdo" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>
    </section>
</main>
<footer class="site-footer">
    <div class="container">
        <div class="social-icons">
            <a href="https://www.instagram.com/velwoodliquorstore1?igsh=YWNtdXJycGJtZHV1"><img src="img/iconoinstagram.jpg" alt="Instagram" class="imgfooter"></a>
        </div>
        <p>&copy; 2026 Velwood Liquor Store. Todos los derechos reservados.</p>
    </div>
</footer>
</body>
</html>
